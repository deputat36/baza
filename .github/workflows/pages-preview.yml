name: Publish HTML preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build XLSX preview
        run: python scripts/tools/build_workbook_from_csv.py

      - name: Build HTML preview
        run: python scripts/tools/build_html_preview.py

      - name: Validate HTML preview
        run: python scripts/tools/validate_html_preview.py

      - name: Build data report
        run: python scripts/tools/build_data_report.py

      - name: Build missing values report
        run: python scripts/tools/build_missing_values_report.py

      - name: Build launch readiness report
        run: python scripts/tools/build_launch_readiness_report.py

      - name: Build source coverage report
        run: python scripts/tools/build_source_coverage_report.py

      - name: Build ID registry report
        run: python scripts/tools/build_id_registry_report.py

      - name: Build schema report
        run: python scripts/tools/build_schema_report.py

      - name: Build data freshness report
        run: python scripts/tools/build_data_freshness_report.py

      - name: Build change request report
        run: python scripts/tools/build_change_request_report.py

      - name: Build role navigation report
        run: python scripts/tools/build_role_navigation_report.py

      - name: Build import plan
        run: python scripts/tools/build_import_plan.py

      - name: Build Google Sheet tabs plan
        run: python scripts/tools/build_google_sheet_tabs_plan.py

      - name: Build Google Sheet validation plan
        run: python scripts/tools/build_google_sheet_validation_plan.py

      - name: Build Google Sheet formatting plan
        run: python scripts/tools/build_google_sheet_formatting_plan.py

      - name: Build knowledge index
        run: python scripts/tools/build_knowledge_index.py

      - name: Validate knowledge index
        run: python scripts/tools/validate_knowledge_index.py

      - name: Build relationship report
        run: python scripts/tools/build_relationship_report.py

      - name: Build deal hint rules
        run: python scripts/tools/build_deal_hint_rules.py

      - name: Build deal hint UI map
        run: python scripts/tools/build_deal_hint_ui_map.py

      - name: Build deal signal report
        run: python scripts/tools/build_deal_signal_report.py

      - name: Build deal hint preview
        run: python scripts/tools/build_deal_hint_preview.py

      - name: Build deal audience report
        run: python scripts/tools/build_deal_audience_report.py

      - name: Build deal hint API examples
        run: python scripts/tools/build_deal_hint_api_examples.py

      - name: Validate integration JSON fields
        run: python scripts/tools/validate_integration_json_fields.py

      - name: Build integration visibility report
        run: python scripts/tools/build_integration_data_visibility_report.py

      - name: Build integration access report
        run: python scripts/tools/build_integration_access_report.py

      - name: Build integration contract report
        run: python scripts/tools/build_integration_contract_report.py

      - name: Build manager dashboard
        run: python scripts/tools/build_manager_dashboard.py

      - name: Build preflight summary
        run: python scripts/tools/build_preflight_summary.py

      - name: Build artifact index
        run: python scripts/tools/build_artifact_index.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
