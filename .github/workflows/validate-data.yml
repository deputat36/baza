name: Validate data files

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate CSV structure
        run: python scripts/tools/validate_csv_structure.py

      - name: Validate workbook sources
        run: python scripts/tools/validate_workbook_sources.py

      - name: Privacy scan warning report
        run: python scripts/tools/privacy_scan.py

      - name: Build XLSX preview
        run: python scripts/tools/build_workbook_from_csv.py

      - name: Build data report
        run: python scripts/tools/build_data_report.py

      - name: Build source coverage report
        run: python scripts/tools/build_source_coverage_report.py

      - name: Build ID registry report
        run: python scripts/tools/build_id_registry_report.py

      - name: Build schema report
        run: python scripts/tools/build_schema_report.py

      - name: Build import plan
        run: python scripts/tools/build_import_plan.py

      - name: Build Google Sheet tabs plan
        run: python scripts/tools/build_google_sheet_tabs_plan.py

      - name: Build preflight summary
        run: python scripts/tools/build_preflight_summary.py

      - name: Inventory files
        run: python scripts/tools/list_project_files.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baza-build-artifacts
          path: build/
